<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Principal Login</title>

<style>
/* ---------------- GLOBAL PAGE STYLE ---------------- */
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    font-family: "Poppins", sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    animation: fadeIn 1.5s ease-in-out;
}

/* Fade-In */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(1.05); }
    to { opacity: 1; transform: scale(1); }
}

/* ---------------- FLOATING SHAPES ---------------- */
.shape {
    position: absolute;
    background: rgba(255,255,255,0.12);
    border-radius: 50%;
    animation: float 6s infinite ease-in-out alternate;
}

.shape:nth-child(1) { width: 120px; height: 120px; top: 10%; left: 15%; animation-duration: 7s; }
.shape:nth-child(2) { width: 170px; height: 170px; bottom: 8%; left: 10%; }
.shape:nth-child(3) { width: 150px; height: 150px; top: 18%; right: 12%; animation-duration: 8s; }
.shape:nth-child(4) { width: 90px; height: 90px; bottom: 22%; right: 18%; animation-duration: 5s; }

@keyframes float {
    from { transform: translateY(0px); }
    to   { transform: translateY(25px); }
}

/* ---------------- LOGIN BOX ---------------- */
.container {
    background: rgba(255, 255, 255, 0.15);
    padding: 40px;
    width: 400px;
    border-radius: 18px;
    backdrop-filter: blur(13px);
    color: #fff;
    box-shadow: 0px 4px 25px rgba(255,255,255,0.3);
    animation: slideUp 1.2s ease;
    text-align: center;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(35px); }
    to   { opacity: 1; transform: translateY(0px); }
}

.container h2 {
    margin-bottom: 15px;
    font-size: 28px;
    font-weight: 700;
}

/* ---------------- INPUT STYLING ---------------- */
label {
    text-align: left;
    display: block;
    margin: 12px 0 5px;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 12px;
    background: rgba(255, 255, 255, 0.25);
    color: black;
    transition: 0.3s;
}

input:focus {
    background: rgba(255,255,255,0.35);
    box-shadow: 0px 0px 10px rgba(255,255,255,0.7);
    outline: none;
}

/* ---------------- BUTTON ---------------- */
.login-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #ffffff, #dfe9f3);
    border: none;
    color: #243b55;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
}

.login-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0px 6px 20px rgba(255,255,255,0.8);
}

.login-btn:active {
    transform: scale(0.97);
}

/* Responsive */
@media (max-width: 450px) {
    .container { width: 90%; }
}
</style>
</head>

<body>

<div class="shape"></div>
<div class="shape"></div>
<div class="shape"></div>
<div class="shape"></div>

<div class="container">
    <h2>Principal Login</h2>

    <form action="login_principle.php" method="POST">

        <label>Principal Name</label>
        <input type="text" name="principalname" required placeholder="Enter Principal Name">

        <label>Email</label>
        <input type="email" name="email" required placeholder="Enter Email">

        <label>Password</label>
        <input type="password" name="password" required placeholder="Enter Password">

        <button class="login-btn" type="submit">Login</button>

    </form>
</div>

</body>
</html>
